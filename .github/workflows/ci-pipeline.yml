# .github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      slug: ${{ steps.slug.outputs.value }}
      image: ghcr.io/${{ steps.repo.outputs.lowercase }}
    steps:
      - uses: actions/checkout@v4

      - name: Get lowercase repository name
        id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Slugify branch name
        id: slug
        run: echo "value=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: latest
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.lowercase }}:${{ steps.slug.outputs.value }}

  pytest:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.slug }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: ./run.sh test

  precommit:
    name: Pre-commit
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.slug }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: pre-commit run

  precommit-all:
    name: Pre-commit (all files)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true   # équivalent de allow_failure: true
    container:
      image: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.slug }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: pre-commit run --all

  rstest:
    name: Cargo Test
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.slug }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: cargo test